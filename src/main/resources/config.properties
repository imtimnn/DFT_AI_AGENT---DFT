app.mode=prod

# ══════════════════════════════════════════════════
#  PROD — chạy thật trên Linux CentOS
#  Không cần khai báo đường dẫn "run" ở đây — AppConfig.java tự tính
#  đường dẫn bằng cách tìm thư mục chứa file .jar đang chạy (xem
#  AppConfig.getAppDirectory() + getRunTclPath()), rồi ghép thêm
#  "/run" — luôn đúng miễn file "run" nằm cùng thư mục với .jar.
# ══════════════════════════════════════════════════

# ══════════════════════════════════════════════════
#  DEV — test trên Windows (không phải máy Linux thật)
# ══════════════════════════════════════════════════
# Lệnh giả lập — mở Calculator thay vì chạy tool thật, chỉ để test
# luồng bấm Login trên Windows trước khi build bản thật chạy Linux.
dev.tool.launch=calc.exe

# Ở mode dev không tự tính đường dẫn theo thư mục .jar (vì đang chạy
# từ IDE/thư mục project, không phải bản cài thật) — lấy thẳng từ đây.
# Đổi đường dẫn dưới cho đúng vị trí thật trên máy Windows.
dev.tcl.run=C:\\Users\\tritin\\Study\\Coding\\SNST-app\\mock\\run